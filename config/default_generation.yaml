# Default generation configuration for SkyScenes pipeline
ROOT_DIR: "/home/df/data/datasets/SkyScenes/proof_of_concept"
save_seg: true  # Enabling GT as per ticket checklist

# Baseline generation settings (manualSpawning.py)
baseline:
  towns: ["Town10HD"]
  weather: "ClearNoon"
  heights: [2.5]  # Starting with ground view as baseline
  pitches: [0]
  num_images: 10

# Variation generation settings (loadingAttributesWeather.py)
# These will be generated for every baseline sequence produced above
variations:
  weather: []  # Already set to ClearNoon exclusively
  heights: [15, 35, 60]
  pitches: [-45, -60, -90]

# Execution settings
execution:
  max_retries: 3
  stop_on_error: false
  resynchronize_world: true
